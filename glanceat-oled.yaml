substitutions:
  device_name: glanceat-oled
  friendly_name: "GlanceAt OLED"

  weather_entity: weather.forecast_home  # Change to your weather entity if needed

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - templates/template_selector.h
    - templates/clock_weather.h
    - templates/calendar.h
    - templates/custom.h
  on_boot:
    priority: 600
    then:
      - output.turn_off: unused_d2
      - output.turn_off: unused_d3
      - output.turn_off: unused_d4
      - output.turn_off: unused_d5
      - output.turn_off: unused_d6
      - output.turn_off: unused_d7
      - output.turn_on: rd_pin
      - output.turn_on: rw_pin

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_key
  services:
    - service: show_notification
      variables:
        message: string
        duration_ms: int
      then:
        - lambda: |-
            id(notification_text) = message;
            id(notification_duration_ms) = duration_ms;
            id(notification_started_ms) = millis();
            id(notification_active) = true;
        - component.update: oled_display

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

captive_portal:

web_server:  

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/London  

globals:
  - id: notification_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: notification_started_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'

  - id: notification_duration_ms
    type: int
    restore_value: no
    initial_value: '5000'

  - id: notification_text
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: active_template
    type: int
    restore_value: no
    initial_value: '1'

spi:
  clk_pin: GPIO35
  mosi_pin: GPIO1

display:
  - platform: ssd1322_spi
    id: oled_display
    model: "SSD1322 256x64"
    cs_pin: GPIO13
    dc_pin: GPIO11
    reset_pin: GPIO12
    rotation: 180
    update_interval: 1s
    lambda: |-
      render_template(it);

select:
  - platform: template
    name: "${friendly_name} Template"
    id: template_select
    optimistic: false
    restore_value: true
    options:
      - "Clock and Weather"
      - "Calendar"
      - "Custom"
    initial_option: "Calendar"
    set_action:
      - lambda: |-
          if (x == "Clock and Weather") {
            id(active_template) = 0;
          } else if (x == "Calendar") {
            id(active_template) = 1;
          } else if (x == "Custom") {
            id(active_template) = 2;
          }

          id(template_select).publish_state(x);
      - component.update: oled_display

font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 24
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
  - file: "gfonts://Roboto"
    id: font_medium
    size: 18
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 10

sensor:
  - platform: homeassistant
    id: weather_temp
    entity_id: ${weather_entity}
    attribute: temperature
    on_value:
      then:
        - component.update: oled_display

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: ${weather_entity}
    on_value:
      then:
        - component.update: oled_display

  - platform: homeassistant
    id: cal_next_title
    entity_id: calendar.glanceatcalendar
    attribute: message
    on_value:
      then:
        - component.update: oled_display

  - platform: homeassistant
    id: cal_next_start
    entity_id: calendar.glanceatcalendar
    attribute: start_time
    on_value:
      then:
        - component.update: oled_display

  - platform: homeassistant
    id: cal_next_end
    entity_id: calendar.glanceatcalendar
    attribute: end_time
    on_value:
      then:
        - component.update: oled_display

output:
  - platform: gpio
    id: unused_d2
    pin: GPIO2
  - platform: gpio
    id: unused_d3
    pin: GPIO4
  - platform: gpio
    id: unused_d4
    pin: GPIO5
  - platform: gpio
    id: unused_d5
    pin: GPIO6
  - platform: gpio
    id: unused_d6
    pin: GPIO7
  - platform: gpio
    id: unused_d7
    pin: GPIO8
  - platform: gpio
    id: rd_pin
    pin: GPIO9
    inverted: true
  - platform: gpio
    id: rw_pin
    pin: GPIO10
    inverted: true